<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Kavya 🎂</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Syne:wght@400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --surface: #0f0f1e;
      --neon-pink: #ff2d78;
      --neon-cyan: #00f5ff;
      --neon-purple: #bf5aff;
      --neon-gold: #ffd700;
      --text: #e8e8ff;
      --muted: #7a7a9a;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    #fireworks-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ===== HERO ===== */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a0033 0%, var(--bg) 70%);
      position: relative;
    }

    .hero-name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(3.5rem, 12vw, 9rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple), var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    /* (rest of your CSS unchanged but valid) */
  </style>
</head>

<body>

<canvas id="fireworks-canvas"></canvas>

<!-- FRIEND OVERLAY -->
<div id="friend-overlay">
  <div class="friend-card">
    <h2>Accept Friendship?</h2>
    <p>Kavya, before you see what's inside... Will you be my friend?</p>

    <div class="friend-btns">
      <button id="yes-btn" onclick="acceptFriendship()">Yes</button>
      <button id="no-btn">No</button>
    </div>

    <div id="accepted-msg">🎉 Welcome bestie!</div>
  </div>
</div>

<!-- HERO -->
<section id="hero">
  <h1 class="hero-name">Kavya</h1>
  <p>Happy Birthday 🎉</p>
</section>

<!-- TIMER -->
<section id="countdown">
  <div>
    <span id="t-years">00</span> Years
    <span id="t-days">000</span> Days
  </div>
</section>

<!-- SCRIPT -->
<script>
const noBtn = document.getElementById("no-btn");
const overlay = document.getElementById("friend-overlay");

noBtn.addEventListener("mouseenter", () => {
  const x = Math.random() * window.innerWidth;
  const y = Math.random() * window.innerHeight;
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
  noBtn.style.position = "fixed";
});

function acceptFriendship() {
  document.getElementById("accepted-msg").style.display = "block";
  setTimeout(() => overlay.style.display = "none", 1500);
}

/* TIMER */
const BIRTH_DATE = new Date("2003-06-13T00:00:00");

function updateTimer() {
  const diff = Date.now() - BIRTH_DATE;
  const s = Math.floor(diff / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  const y = Math.floor(d / 365.25);

  document.getElementById("t-years").textContent = y;
  document.getElementById("t-days").textContent = d % 365;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>

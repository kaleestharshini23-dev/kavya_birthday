<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Surprise 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #07070f;
    color: white;
    overflow-x: hidden;
  }

  canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
  }

  /* CENTER BOX */
  .screen {
    display: none;
    min-height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
  }

  .active {
    display: flex;
  }

  h1 {
    font-family: Orbitron;
    margin-bottom: 15px;
  }

  input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    width: 200px;
    margin-top: 10px;
    text-align: center;
  }

  /* 🎨 BUTTONS */
  button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
  }

  .yes {
    background: linear-gradient(135deg,#00f5ff,#7c4dff);
    color: black;
  }

  .no {
    background: linear-gradient(135deg,#ff2d78,#ff7a18);
    color: white;
  }

  button:hover {
    transform: scale(1.08);
  }

  /* FINAL */
  .final {
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-family: Orbitron;
    background: linear-gradient(135deg,#ff2d78,#7c4dff,#00f5ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: glow 2s infinite alternate;
  }

  @keyframes glow {
    from { filter: drop-shadow(0 0 10px #ff2d78); }
    to { filter: drop-shadow(0 0 25px #00f5ff); }
  }
</style>
</head>
 <!-- force update -->

<body> 

<canvas id="fx"></canvas>

<!-- 1️⃣ FRIENDSHIP -->
<div class="screen active" id="page1">
  <h1>💖 Accept Friendship?</h1>
  <p>Kavya, are you ready for surprise?</p>

  <button class="yes" onclick="goCode()">YES</button>
  <button class="no">NO</button>
</div>

<!-- 2️⃣ SECRET CODE -->
<div class="screen" id="page2">
  <h1>🔐 Enter Secret Code</h1>
  <p>Hint: Birthday year 😏</p>

  <input id="code" placeholder="Enter code"/>
  <button class="yes" onclick="checkCode()">Unlock</button>
</div>

<!-- 3️⃣ QUESTIONS -->
<div class="screen" id="page3">
  <h1>❓ Quick Questions</h1>

  <p>Do you like surprises?</p>
  <button class="yes" onclick="nextQ()">Yes</button>
  <button class="no" onclick="nextQ()">No</button>
</div>

<!-- 4️⃣ FINAL -->
<div class="screen" id="page4">
  <h1 class="final">🎂 HAPPY BIRTHDAY KAVYA 🎉</h1>
  <p>✨ You are special ✨</p>
</div>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
let current = 1;

/* PAGE SWITCH */
function show(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("page"+n).classList.add("active");
  current = n;
}

/* 1 → 2 */
function goCode(){
  show(2);
}

/* SECRET CODE */
function checkCode(){
  const val = document.getElementById("code").value;

  if(val === "2003"){
    confetti();
    show(3);
  } else {
    alert("Wrong code 😏 Hint: year");
  }
}

/* QUESTIONS */
function nextQ(){
  show(4);

  confetti({
    particleCount: 200,
    spread: 120,
    origin: { y: 0.6 }
  });
}
</script>

</body>
</html>

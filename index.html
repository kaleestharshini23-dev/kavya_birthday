<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Kavya 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #07070f;
    --text: #e8e8ff;
    --cyan: #00f5ff;
    --pink: #ff2d78;
    --purple: #bf5aff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
  }

  /* ===== PAGE 1 ===== */
  #friend-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .friend-card {
    background: rgba(20,20,40,0.9);
    padding: 30px;
    border-radius: 18px;
    width: 320px;
    text-align: center;
    box-shadow: 0 0 30px rgba(255,45,120,0.4);
    backdrop-filter: blur(10px);
  }

  .friend-card h2 {
    margin-bottom: 10px;
  }

  .friend-btns {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
  }

  /* ===== MODERN BUTTONS ===== */
  button {
    padding: 12px 22px;
    border: none;
    cursor: pointer;
    border-radius: 14px;
    font-weight: 600;
    transition: 0.3s ease;
    font-size: 14px;
  }

  #yes-btn {
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    color: #000;
    box-shadow: 0 0 18px rgba(0,245,255,0.5);
  }

  #yes-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 28px rgba(0,245,255,0.9);
  }

  #no-btn {
    background: rgba(255,45,120,0.15);
    border: 1px solid rgba(255,45,120,0.5);
    color: var(--pink);
  }

  #no-btn:hover {
    transform: scale(1.08);
    background: rgba(255,45,120,0.3);
    box-shadow: 0 0 20px rgba(255,45,120,0.6);
  }

  #accepted-msg {
    display: none;
    margin-top: 12px;
    color: #00ff88;
    font-weight: 600;
  }

  /* ===== PAGE 2 ===== */
  #hero {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .hero-name {
    font-family: 'Orbitron';
    font-size: clamp(3rem, 10vw, 8rem);
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #countdown {
    display: none;
    margin-top: 20px;
    font-size: 1.2rem;
  }
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<!-- PAGE 1 -->
<div id="friend-overlay">
  <div class="friend-card">
    <h2>Accept Friendship?</h2>
    <p>Kavya 💖, will you accept?</p>

    <div class="friend-btns">
      <button id="yes-btn" onclick="acceptFriendship()">Yes</button>
      <button id="no-btn">No</button>
    </div>

    <div id="accepted-msg">🎉 Welcome Bestie!</div>
  </div>
</div>

<!-- PAGE 2 -->
<section id="hero">
  <h1 class="hero-name">Kavya</h1>
  <p>Happy Birthday 🎂</p>
</section>

<section id="countdown">
  <span id="t-years">00</span> Years
  <span id="t-days">000</span> Days
</section>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
let locked = false;

const overlay = document.getElementById("friend-overlay");
const noBtn = document.getElementById("no-btn");

/* NO button escape */
noBtn.addEventListener("mouseenter", () => {
  if (locked) return;

  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 120);

  noBtn.style.position = "fixed";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

/* YES click */
function acceptFriendship() {
  if (locked) return;
  locked = true;

  document.getElementById("yes-btn").style.pointerEvents = "none";
  document.getElementById("yes-btn").style.opacity = "0.6";

  document.getElementById("accepted-msg").style.display = "block";

  confetti({
    particleCount: 200,
    spread: 100,
    origin: { y: 0.6 }
  });

  setTimeout(() => {
    overlay.style.display = "none";

    document.getElementById("hero").style.display = "flex";
    document.getElementById("countdown").style.display = "block";
  }, 1200);
}

/* TIMER */
const BIRTH_DATE = new Date("2003-06-13T00:00:00");

function updateTimer() {
  const diff = Date.now() - BIRTH_DATE;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const years = Math.floor(days / 365.25);

  document.getElementById("t-years").textContent = years;
  document.getElementById("t-days").textContent = days % 365;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>

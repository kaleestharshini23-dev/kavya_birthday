<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Surprise 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #07070f;
    color: white;
  }

  /* SCREEN */
  .screen {
    display: none;
    min-height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
  }

  .active { display:flex; }

  h1 {
    font-family: Orbitron;
    margin-bottom: 15px;
  }

  /* 🎨 MODERN BUTTONS */
  button {
    padding: 12px 26px;
    border: none;
    border-radius: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin: 8px;
  }

  .yes {
    background: linear-gradient(135deg,#00f5ff,#7c4dff);
    color: black;
    box-shadow: 0 0 20px #00f5ff;
  }

  .no {
    background: linear-gradient(135deg,#ff2d78,#ff8a00);
    color: white;
    position: absolute;
  }

  button:hover {
    transform: scale(1.1);
  }

  /* INPUT PASSWORD DOT STYLE */
  input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    width: 220px;
    text-align: center;
    font-size: 18px;
    letter-spacing: 5px;
  }

  /* FINAL */
  .final {
    font-size: clamp(2.5rem,6vw,5rem);
    font-family: Orbitron;
    background: linear-gradient(135deg,#ff2d78,#7c4dff,#00f5ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: glow 2s infinite alternate;
  }

  @keyframes glow {
    from { filter: drop-shadow(0 0 10px #ff2d78); }
    to { filter: drop-shadow(0 0 25px #00f5ff); }
  }
</style>
</head>

<body>

<!-- 1 FRIEND -->
<div class="screen active" id="page1">
  <h1>💖 Accept Friendship?</h1>

  <button class="yes" onclick="goCode()">YES</button>
  <button class="no" id="noBtn">NO</button>
</div>

<!-- 2 SECRET CODE -->
<div class="screen" id="page2">
  <h1>🔐 Enter Secret Code</h1>
  <p>Hint: Birthday year 😏</p>

  <input id="code" type="password" placeholder="••••••"/>
  <button class="yes" onclick="checkCode()">Unlock</button>
</div>

<!-- 3 QUESTIONS -->
<div class="screen" id="page3">
  <h1>❓ Do you like surprises?</h1>

  <button class="yes" onclick="showFinal()">YES</button>
  <button class="no" onclick="showFinal()">NO</button>
</div>

<!-- 4 FINAL -->
<div class="screen" id="page4">
  <h1 class="final">🎂 HAPPY BIRTHDAY 🎉</h1>
  <p>✨ You are special ✨</p>
</div>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
let current = 1;

/* PAGE SWITCH */
function show(n){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("page"+n).classList.add("active");
  current = n;
}

/* 1 -> 2 */
function goCode(){
  show(2);
}

/* SECRET CODE */
function checkCode(){
  const val = document.getElementById("code").value;

  if(val === "2003"){
    confetti();
    show(3);
  } else {
    alert("Wrong Code 😏 Hint: Year");
  }
}

/* FINAL */
function showFinal(){
  show(4);

  confetti({
    particleCount: 200,
    spread: 120,
    origin: { y: 0.6 }
  });
}

/* 🚨 NO BUTTON RUNAWAY */
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseenter", runAway);
noBtn.addEventListener("mousemove", runAway);

function runAway(){
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 100);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}
</script>

</body>
</html>
